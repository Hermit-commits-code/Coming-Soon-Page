<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Base Apparel Coming Soon</title>
  </head>

  <body>
    <main class="container">
      <div class="left">
        <section class="left-upper">
          <img src="images/logo.svg" alt="Base Apparel logo">
        </section>
        <section class="left-main">
          <span class="left-main--spanUpper">we're</span>
          <span class="left-main--spanMid">coming</span>
          <span class="left-main--spanLow">soon</span>
          <p class="greeting-text">
            Hello fellow shoppers! We're currently building our
            new fashion store. Add your email below to stay up to
            date with announcements and our launch deals
          </p>
          <div class="left-main--input">
            <form class="signup-form" id="signupForm" novalidate>
              <input id="emailInput" type="email" placeholder="Email Address" aria-describedby="emailError" required>
              <button type="submit" aria-label="Submit email"><img src="images/icon-arrow.svg" alt=""></button>
            </form>
            <p class="form-error" id="emailError" aria-live="polite"></p>
          </div>
        </section>

      </div>
      <div class="right">
        <picture>
          <source media="(max-width: 768px)" srcset="images/hero-mobile.jpg">
          <img src="images/hero-desktop.jpg" alt="Model wearing Base Apparel clothing">
        </picture>
      </div>
    </main>
  </body>

</html>
